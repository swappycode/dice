// Message send path rides the gateway socket (nonce in Frame); history is REST.
syntax = "proto3";
package dice.v1;

import "dice/v1/common.proto";

message SendMessageRequest {
  fixed64 channel_id = 1;
  string content = 2;        // 1..4000 chars after trim (may be empty if attachments)
  fixed64 reply_to_id = 3;   // 0 = not a reply
  repeated fixed64 attachment_ids = 4; // pre-uploaded media to attach (≤10), in display order
}

// Attachment upload (M2): protobuf body to POST /v1/media (bearer). The whole
// file rides one protobuf message — consistent with the rest of the REST
// surface — under a larger body limit than the 1 MiB realtime cap. The reply
// echoes the stored Attachment metadata; the id is then referenced in
// SendMessageRequest.attachment_ids.
message UploadMediaRequest {
  string filename = 1;       // original name; server keeps the basename only
  string content_type = 2;   // client-declared MIME; server validates/sniffs
  bytes data = 3;            // raw file bytes
}
message UploadMediaResponse {
  Attachment attachment = 1;
}

// Reactions (M2): toggle one emoji on one message.
message AddReactionRequest {
  fixed64 channel_id = 1;
  fixed64 message_id = 2;
  string emoji = 3;
}
message RemoveReactionRequest {
  fixed64 channel_id = 1;
  fixed64 message_id = 2;
  string emoji = 3;
}

// Broadcast DELTA (not a full snapshot): each client adjusts its own aggregate
// and flips `me` when user_id is itself. History/Ready carry the snapshot.
message ReactionUpdate {
  fixed64 channel_id = 1;
  fixed64 message_id = 2;
  string emoji = 3;
  fixed64 user_id = 4;
  bool added = 5;            // true = added, false = removed
}

message SendMessageAck {
  Message message = 1;       // Frame.nonce echoes the request
}

// Edit: author-only. Delete: author, or MANAGE_MESSAGES in a guild channel.
message EditMessageRequest {
  fixed64 channel_id = 1;
  fixed64 message_id = 2;
  string content = 3;        // 1..4000 chars after trim
}
message DeleteMessageRequest {
  fixed64 channel_id = 1;
  fixed64 message_id = 2;
}

message MessageCreate {
  Message message = 1;
  uint64 nonce = 2;          // originating client's nonce; 0 for everyone else's sends
}

// Edit broadcasts the full updated Message (edited_at_ms set); delete carries ids only.
message MessageUpdate { Message message = 1; }
message MessageDelete {
  fixed64 channel_id = 1;
  fixed64 message_id = 2;
}

// GET /v1/channels/{id}/messages response body.
message MessageHistory {
  repeated Message messages = 1;  // descending by id (newest first)
}

// Unread badges (M2 notifications). Server-maintained per-channel counts for
// the requesting user; POST /v1/channels/{id}/read clears one.
message UnreadEntry {
  fixed64 channel_id = 1;
  uint64 count = 2;
}
message UnreadCounts {
  repeated UnreadEntry entries = 1;  // GET /v1/unread; non-zero channels only
}

// Read-marker advance (M2 item 10). Broadcast to the user's OWN subject so
// their other devices clear the channel's unread badge in sync.
message ReadMarkerUpdate {
  fixed64 channel_id = 1;
  fixed64 last_read_message_id = 2;
}
