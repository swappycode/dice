// Message send path rides the gateway socket (nonce in Frame); history is REST.
syntax = "proto3";
package dice.v1;

import "dice/v1/common.proto";

message SendMessageRequest {
  fixed64 channel_id = 1;
  string content = 2;        // 1..4000 chars after trim
  fixed64 reply_to_id = 3;   // 0 = not a reply
}

// Reactions (M2): toggle one emoji on one message.
message AddReactionRequest {
  fixed64 channel_id = 1;
  fixed64 message_id = 2;
  string emoji = 3;
}
message RemoveReactionRequest {
  fixed64 channel_id = 1;
  fixed64 message_id = 2;
  string emoji = 3;
}

// Broadcast DELTA (not a full snapshot): each client adjusts its own aggregate
// and flips `me` when user_id is itself. History/Ready carry the snapshot.
message ReactionUpdate {
  fixed64 channel_id = 1;
  fixed64 message_id = 2;
  string emoji = 3;
  fixed64 user_id = 4;
  bool added = 5;            // true = added, false = removed
}

message SendMessageAck {
  Message message = 1;       // Frame.nonce echoes the request
}

// Edit: author-only. Delete: author, or MANAGE_MESSAGES in a guild channel.
message EditMessageRequest {
  fixed64 channel_id = 1;
  fixed64 message_id = 2;
  string content = 3;        // 1..4000 chars after trim
}
message DeleteMessageRequest {
  fixed64 channel_id = 1;
  fixed64 message_id = 2;
}

message MessageCreate {
  Message message = 1;
  uint64 nonce = 2;          // originating client's nonce; 0 for everyone else's sends
}

// Edit broadcasts the full updated Message (edited_at_ms set); delete carries ids only.
message MessageUpdate { Message message = 1; }
message MessageDelete {
  fixed64 channel_id = 1;
  fixed64 message_id = 2;
}

// GET /v1/channels/{id}/messages response body.
message MessageHistory {
  repeated Message messages = 1;  // descending by id (newest first)
}
