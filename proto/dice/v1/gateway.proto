// Gateway lifecycle/control frames. See docs/protocol.md (normative).
syntax = "proto3";
package dice.v1;

import "dice/v1/common.proto";
import "dice/v1/presence.proto";
import "dice/v1/message.proto";

message Hello {
  uint32 heartbeat_interval_ms = 1;  // 30000; client jitters first beat +/-10%
  uint32 resume_window_ms = 2;       // 60000
  uint32 max_frame_bytes = 3;        // 262144
}

message ClientProperties {
  string client = 1;
  string version = 2;
  string os = 3;
}

message Identify {
  string access_token = 1;       // JWT from auth REST
  ClientProperties properties = 2;
  uint64 capabilities = 3;       // bit 0: voice over QUIC datagrams (M3); see dice_protocol::CAP_VOICE_DATAGRAMS
  uint32 protocol_version = 4;   // minor; major is in ALPN/URL
}

message Resume {
  fixed64 gateway_session_id = 1;
  bytes resume_token = 2;        // 32 bytes from Ready
  uint64 last_seq = 3;
}

message Ready {
  fixed64 gateway_session_id = 1;
  bytes resume_token = 2;            // 32 random bytes, bound to this session
  User user = 3;
  repeated Guild guilds = 4;         // full snapshot incl. channels/members/invite_code
  repeated Channel dm_channels = 5;
  repeated PresenceUpdate presences = 6;
  repeated User users = 7;           // deduped dictionary: all members + DM recipients
  // Per-channel last-read pointers (read_markers table) so the client can render
  // the unread divider on first open without waiting for a live ReadMarkerUpdate.
  // Only channels the user has ever marked read appear.
  repeated ReadMarkerUpdate read_markers = 8;
}

message Resumed {}

message Heartbeat {
  uint64 last_seq = 1;       // cumulative ack: server trims replay buffer to seq > last_seq
  uint64 client_time_ms = 2;
}

message HeartbeatAck {
  uint64 client_time_ms = 1; // echo -> client RTT
}

// WS close code = QUIC application close code = 4000 + ErrorCode.
// 4010 (SLOW_CONSUMER) and 4011 (GOING_AWAY) are resumable reconnects.
message Close {
  uint32 code = 1;
  string reason = 2;
}

message Error {
  ErrorCode code = 1;
  string message = 2;
  uint32 retry_after_ms = 3; // RATE_LIMITED only
  // INVALID_SESSION cross-node resume only (ADR-0007 phase 0b): the reachable
  // `host:port` of the gateway node that still owns the detached session. When
  // set, the client reconnects there and retries Resume; empty otherwise.
  string redirect_addr = 4;
}

enum ErrorCode {
  ERROR_CODE_UNSPECIFIED = 0;
  ERROR_CODE_UNAUTHENTICATED = 1;
  ERROR_CODE_INVALID_SESSION = 2;
  ERROR_CODE_RATE_LIMITED = 3;
  ERROR_CODE_PERMISSION_DENIED = 4;
  ERROR_CODE_NOT_FOUND = 5;
  ERROR_CODE_INVALID_ARGUMENT = 6;
  ERROR_CODE_UNKNOWN_OPCODE = 7;
  ERROR_CODE_PAYLOAD_TOO_LARGE = 8;
  ERROR_CODE_INTERNAL = 9;
  ERROR_CODE_SLOW_CONSUMER = 10;
  ERROR_CODE_GOING_AWAY = 11;
  // Server closed because the client missed 2 heartbeats. Distinct from
  // GOING_AWAY (server shutdown) for observability; both are resumable.
  ERROR_CODE_HEARTBEAT_TIMEOUT = 12;
}
