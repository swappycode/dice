// User profile mutations + the user-update dispatch (M2 avatars).
syntax = "proto3";
package dice.v1;

import "dice/v1/common.proto";

// PUT /v1/users/@me/avatar — set or clear the caller's avatar. `media_id`
// references an already-uploaded image (POST /v1/media); 0 clears the avatar.
message SetAvatarRequest {
  fixed64 media_id = 1;
}

// Broadcast when a user's profile changes (avatar today). Fanned out to the
// user's own subject + every guild and DM they share, so peers update live.
message UserUpdate {
  User user = 1;
}

// -- on-demand user resolution (M4) --
// Client->server request (frame 38, nonce set): resolve user records by id, used
// to fill in message authors the client does not yet have (e.g. guild members
// beyond the ~100 Ready inlines for CAP_LAZY_MEMBERS clients). The server returns
// only users the actor shares a guild with; unknown / not-shared ids are omitted.
message RequestUsers {
  repeated fixed64 user_ids = 1;   // server clamps to <= 100 per request
}
// Server->client reply (frame 52, nonce echoed): the resolved user records — a
// subset of the request.
message UsersChunk {
  repeated User users = 1;
}
