// Service-to-service request/response pairs for NATS request-reply (split mode).
// Subjects: dice.rpc.{service}.{method}, queue group = service name. The reply
// envelope (ok/error tag) is framed by hand in dice-event-bus::rpc, so only the
// method payloads live here. Presence is the first service wired (the others
// follow the identical pattern). See docs/design/backend-services.md.
syntax = "proto3";
package dice.internal.v1;

import "dice/v1/presence.proto";

message PresenceConnectReq {
  fixed64 user = 1;
  fixed64 session = 2;
  repeated fixed64 guild_ids = 3;
  repeated fixed64 dm_channel_ids = 4;
  dice.v1.PresenceStatus status = 5;
}

message PresenceHeartbeatReq {
  fixed64 user = 1;
  fixed64 session = 2;
}

message PresenceSetStatusReq {
  fixed64 user = 1;
  fixed64 session = 2;
  dice.v1.PresenceStatus status = 3;
}

message PresenceDisconnectReq {
  fixed64 user = 1;
  fixed64 session = 2;
}

message PresenceInterestReq {
  fixed64 user = 1;
  fixed64 session = 2;
  repeated fixed64 guild_ids = 3;
  repeated fixed64 dm_channel_ids = 4;
}

message PresenceSnapshotReq {
  repeated fixed64 users = 1;
}

message PresenceSnapshotResp {
  repeated dice.v1.PresenceUpdate updates = 1;
}

// ---- auth (dice.rpc.auth.*) ----
// Only the requests that carry fields the public HTTP body lacks (the caller's
// IP, or the bearer-resolved user id) need a dedicated message. The others reuse
// the dice.v1 auth bodies directly (RefreshRequest, LogoutRequest,
// CompleteTotpRequest, VerifyEmailRequest, PasswordResetConfirm), and every
// success path replies with a dice.v1 message (AuthSuccess / LoginResponse /
// TotpEnrollResponse / TotpConfirmResponse). `ip` empty ⇒ None.

message AuthRegisterReq {
  string email = 1;
  string username = 2;
  string password = 3;
  string ip = 4;
}

message AuthLoginReq {
  string email = 1;
  string password = 2;
  string ip = 3;
}

// totp_enroll / resend_verification: a bearer-resolved user id.
message AuthUserReq {
  fixed64 user = 1;
}

// totp_confirm / totp_disable: user + a TOTP/recovery code.
message AuthUserCodeReq {
  fixed64 user = 1;
  string code = 2;
}

message AuthPasswordResetReq {
  string email = 1;
  string ip = 2;
}
