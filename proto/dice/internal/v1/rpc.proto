// Service-to-service request/response pairs for NATS request-reply (split mode).
// Subjects: dice.rpc.{service}.{method}, queue group = service name. The reply
// envelope (ok/error tag) is framed by hand in dice-event-bus::rpc, so only the
// method payloads live here. Presence is the first service wired (the others
// follow the identical pattern). See docs/design/backend-services.md.
syntax = "proto3";
package dice.internal.v1;

import "dice/v1/presence.proto";
import "dice/v1/common.proto";

message PresenceConnectReq {
  fixed64 user = 1;
  fixed64 session = 2;
  repeated fixed64 guild_ids = 3;
  repeated fixed64 dm_channel_ids = 4;
  dice.v1.PresenceStatus status = 5;
}

message PresenceHeartbeatReq {
  fixed64 user = 1;
  fixed64 session = 2;
}

message PresenceSetStatusReq {
  fixed64 user = 1;
  fixed64 session = 2;
  dice.v1.PresenceStatus status = 3;
}

message PresenceDisconnectReq {
  fixed64 user = 1;
  fixed64 session = 2;
}

message PresenceInterestReq {
  fixed64 user = 1;
  fixed64 session = 2;
  repeated fixed64 guild_ids = 3;
  repeated fixed64 dm_channel_ids = 4;
}

message PresenceSnapshotReq {
  repeated fixed64 users = 1;
}

message PresenceSnapshotResp {
  repeated dice.v1.PresenceUpdate updates = 1;
}

// ---- auth (dice.rpc.auth.*) ----
// Only the requests that carry fields the public HTTP body lacks (the caller's
// IP, or the bearer-resolved user id) need a dedicated message. The others reuse
// the dice.v1 auth bodies directly (RefreshRequest, LogoutRequest,
// CompleteTotpRequest, VerifyEmailRequest, PasswordResetConfirm), and every
// success path replies with a dice.v1 message (AuthSuccess / LoginResponse /
// TotpEnrollResponse / TotpConfirmResponse). `ip` empty ⇒ None.

message AuthRegisterReq {
  string email = 1;
  string username = 2;
  string password = 3;
  string ip = 4;
}

message AuthLoginReq {
  string email = 1;
  string password = 2;
  string ip = 3;
}

// totp_enroll / resend_verification: a bearer-resolved user id.
message AuthUserReq {
  fixed64 user = 1;
}

// totp_confirm / totp_disable: user + a TOTP/recovery code.
message AuthUserCodeReq {
  fixed64 user = 1;
  string code = 2;
}

message AuthPasswordResetReq {
  string email = 1;
  string ip = 2;
}

// ---- chat (dice.rpc.chat.*) ----
// Every request carries the actor (the gateway resolves it from the bearer
// token / socket session before the RPC). Single-object responses reuse the
// dice.v1 message directly (Message / Guild / Channel / User / Friend /
// FriendList); only the two list returns need a wrapper. `reply_to` / `media` /
// `cursor_id` == 0 mean "none/latest".

message ChatSyncReq { fixed64 user = 1; }
message ChatSyncResp {
  repeated dice.v1.Guild guilds = 1;
  repeated dice.v1.Channel dm_channels = 2;
  repeated dice.v1.User users = 3;
}

message ChatSendMessageReq {
  fixed64 actor = 1;
  fixed64 channel = 2;
  string content = 3;
  fixed64 reply_to = 4;            // 0 = not a reply
  repeated fixed64 attachments = 5;
  fixed64 nonce = 6;
}

message ChatGetMessagesReq {
  fixed64 actor = 1;
  fixed64 channel = 2;
  uint32 cursor_kind = 3;          // 0 = latest, 1 = before, 2 = after
  fixed64 cursor_id = 4;
  uint32 limit = 5;
}
message ChatMessagesResp { repeated dice.v1.Message messages = 1; }
message ChatRequestMembersReq {
  fixed64 actor = 1;
  fixed64 guild = 2;
  fixed64 after = 3;
  uint32 limit = 4;
}
message ChatRequestMembersResp {
  repeated dice.v1.Member members = 1;
  repeated dice.v1.User users = 2;
  bool has_more = 3;
}

message ChatEditMessageReq {
  fixed64 actor = 1;
  fixed64 channel = 2;
  fixed64 message = 3;
  string content = 4;
}

// delete_message
message ChatMessageRefReq {
  fixed64 actor = 1;
  fixed64 channel = 2;
  fixed64 message = 3;
}

// add_reaction / remove_reaction
message ChatReactionReq {
  fixed64 actor = 1;
  fixed64 channel = 2;
  fixed64 message = 3;
  string emoji = 4;
}

message ChatCreateGuildReq {
  fixed64 actor = 1;
  string name = 2;
}
message ChatJoinGuildReq {
  fixed64 actor = 1;
  string code = 2;
}
message ChatCreateChannelReq {
  fixed64 actor = 1;
  fixed64 guild = 2;
  string name = 3;
  dice.v1.ChannelKind kind = 4;
}
message ChatOpenDmReq {
  fixed64 actor = 1;
  fixed64 other = 2;
}

// typing / mark_read
message ChatChannelRefReq {
  fixed64 actor = 1;
  fixed64 channel = 2;
}

message ChatSetAvatarReq {
  fixed64 actor = 1;
  fixed64 media = 2;               // 0 = clear
}

// list_friends
message ChatActorReq { fixed64 actor = 1; }
message ChatAddFriendReq {
  fixed64 actor = 1;
  string username = 2;
}
// accept_friend / decline_friend / remove_friend
message ChatFriendRefReq {
  fixed64 actor = 1;
  fixed64 other = 2;
}
