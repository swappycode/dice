<!doctype html>
<html lang="en" data-theme="luna">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dice</title>
    <script>
      var themes = ["luna", "aero", "midnight", "nocturne", "vantablack", "bubble", "phosphor"];
      var t = localStorage.getItem("dice.theme");
      document.documentElement.dataset.theme = themes.indexOf(t) >= 0 ? t : "luna";
      if (localStorage.getItem("dice.perfMode") === "1")
        document.documentElement.classList.add("perf-mode");
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
