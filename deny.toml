# cargo-deny — supply-chain gate (M5 hardening). Run locally with `just deny`
# (or `cargo deny check`); CI runs the same. Three things it enforces:
#   * advisories — no known-vulnerable or yanked crates (RustSec DB),
#   * licenses   — only permissive licenses (the project ships MIT OR Apache-2.0),
#   * bans       — the ring-only TLS policy: aws-lc / OpenSSL may never enter the
#                  tree (mirrors `just gate-aws-lc`, but as a hard cargo-deny ban).

[graph]
all-features = false

[advisories]
# Schema v2: vulnerabilities + unsound are denied, unmaintained/notice warn.
version = 2
yanked = "deny"
ignore = []

[licenses]
# Schema v2: anything NOT in `allow` fails the check.
version = 2
confidence-threshold = 0.9
allow = [
  "MIT",
  "Apache-2.0",
  "Apache-2.0 WITH LLVM-exception",
  "BSD-2-Clause",
  "BSD-3-Clause",
  "ISC",
  "Zlib",
  "MPL-2.0",
  "BSL-1.0",
  "CC0-1.0",
  "Unicode-3.0",
  "Unicode-DFS-2016",
  "OpenSSL",
]
exceptions = []

# `ring`'s license is a non-SPDX bundle (ISC + MIT + OpenSSL); the three are all
# allow-listed above, so detection covers it. If a CI run flags ring's LICENSE
# file, add a `[[licenses.clarify]]` here with the hash cargo-deny prints.

[bans]
multiple-versions = "warn"
wildcards = "allow"
# The hard line: ring is the ONLY TLS crypto provider (no NASM/CMake toolchain).
deny = [
  { name = "aws-lc-sys" },
  { name = "aws-lc-rs" },
  { name = "openssl-sys" },
  { name = "openssl" },
]

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
