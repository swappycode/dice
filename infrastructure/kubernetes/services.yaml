# The split-mode service responders. Each is a StatefulSet so every pod gets a
# distinct DICE_NODE_ID (base offset + ordinal) for snowflake uniqueness across
# the whole fleet (gateway 0.., auth 256.., chat 512.., presence 768..). They
# answer the gateway over NATS RPC (queue groups load-balance replicas), so they
# need NO client-facing Service — only a headless one for stable DNS + metrics
# scraping. No DICE_SPLIT, no advertised address (they are not gateways).
#
# --- auth-service: verifies the SAME Ed25519 JWT pair the gateway signs with ---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: dice-auth
  namespace: dice
  labels: { app.kubernetes.io/name: dice-auth, app.kubernetes.io/part-of: dice }
spec:
  serviceName: dice-auth-headless
  replicas: 2
  podManagementPolicy: Parallel
  selector:
    matchLabels: { app.kubernetes.io/name: dice-auth }
  template:
    metadata:
      labels: { app.kubernetes.io/name: dice-auth, app.kubernetes.io/part-of: dice }
    spec:
      terminationGracePeriodSeconds: 20
      containers:
        - name: auth
          image: ghcr.io/swappycode/dice:latest
          command:
            - /bin/sh
            - -c
            - |
              set -eu
              export DICE_NODE_ID="$((NODE_ID_BASE + ${HOSTNAME##*-}))"
              exec /usr/local/bin/auth-service
          env:
            - { name: NODE_ID_BASE, value: "256" }
            - { name: DICE_SERVICE_NAME, value: "auth-service" }
          envFrom:
            - configMapRef: { name: dice-config }
            - secretRef: { name: dice-db }
          ports:
            - { name: admin, containerPort: 9600, protocol: TCP }
          readinessProbe: { httpGet: { path: /metrics, port: admin }, initialDelaySeconds: 5, periodSeconds: 10 }
          resources:
            requests: { cpu: "100m", memory: "128Mi" }
            limits: { cpu: "1", memory: "512Mi" }
          volumeMounts:
            - { name: jwt, mountPath: /etc/dice/keys, readOnly: true }
      volumes:
        - { name: jwt, secret: { secretName: dice-jwt } }
---
apiVersion: v1
kind: Service
metadata: { name: dice-auth-headless, namespace: dice, labels: { app.kubernetes.io/name: dice-auth } }
spec:
  clusterIP: None
  selector: { app.kubernetes.io/name: dice-auth }
  ports: [{ name: admin, port: 9600, protocol: TCP }]
---
