# Minimal single-binary Tempo for local trace viewing (just metrics-up). Accepts
# OTLP/HTTP on :4318 (the Dice services export here) and serves the query API on
# :3200 (Grafana's Tempo datasource). Storage is ephemeral under /tmp (world-
# writable, so no container-user/volume permission dance) — fine for a dev demo.
server:
  http_listen_port: 3200

distributor:
  receivers:
    otlp:
      protocols:
        http:
          endpoint: 0.0.0.0:4318

ingester:
  max_block_duration: 5m

storage:
  trace:
    backend: local
    local:
      path: /tmp/tempo/blocks
    wal:
      path: /tmp/tempo/wal

usage_report:
  reporting_enabled: false
